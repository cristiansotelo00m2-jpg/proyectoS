<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

    <header>
        <div class="flex items-center gap-2.5 font-bold text-[14px] tracking-wider">

        <nav>

    <main>
        <!-- Hero: Ajustado para que el fondo resalte más el texto -->
        <section class="h-[450px] flex items-center justify-center text-center text-white bg-cover bg-center relative" 
                 style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://ecogreenbiode.com/wp-content/uploads/2023/04/kit-familiar2-scaled.jpg');">

                <p class="text-[14px] md:text-[16px] max-w-[850px] mx-auto mt-4 font-bold tracking-wider leading-relaxed [text-shadow:2px_2px_4px_rgba(0,0,0,0.8)]">

        <section class="w-full bg-white py-8 overflow-hidden border-b border-gray-100">
            <div class="flex w-max animate-scroll pause-on-hover">
                <!-- Primer Grupo -->
                <div class="flex items-center gap-16 px-8"> 
                    <img src="imagenes/logo-a-raz.png" alt="Bio Amigables" class="h-14 w-auto shrink-0">
                    <img src="imagenes/clientes-3-2.webp" alt="Empaques Soluciones" class="h-14 w-auto shrink-0">
                    <img src="imagenes/Logo_Ventas_Institucionales.png" alt="Ventas Inst" class="h-14 w-auto shrink-0">
                    <img src="imagenes/estrena.png" alt="Estrena" class="h-14 w-auto shrink-0">
                    <img src="imagenes/dieziquis.png" alt="Dieziquis" class="h-14 w-auto shrink-0">
                    <img src="imagenes/kive.png" alt="Kive" class="h-14 w-auto shrink-0">
                    <img src="imagenes/dc.png" alt="DC" class="h-14 w-auto shrink-0"> 
                </div>
                <!-- Grupo Duplicado (Mismo gap-16 para que no salte) -->
                <div class="flex items-center gap-16 px-8"> 
                    <img src="imagenes/logo-a-raz.png" alt="Bio Amigables" class="h-14 w-auto shrink-0">
                    <img src="imagenes/clientes-3-2.webp" alt="Empaques Soluciones" class="h-14 w-auto shrink-0">
                    <img src="imagenes/Logo_Ventas_Institucionales.png" alt="Ventas Inst" class="h-14 w-auto shrink-0">

                    <img src="imagenes/dc.png" alt="DC" class="h-14 w-auto shrink-0"> 
                </div>
            </div>
