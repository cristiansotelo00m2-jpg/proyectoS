<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos a EcoGreen</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <header>
        <div>
            <img src="imagenes/icono-hoja.png" alt=""> 
            <span>SOURCE VISION GAIN</span>
        </div>

        <nav>
            <a href="index.html">INICIO</a>
            <a href="quienessomos.html">¿QUIENES SOMOS?</a>
            <a href="gestiondeusuarios.html">GESTIÓN DE USUARIOS</a>
            <a href="gestiondeventas.html">VENTAS</a>
            <a href="gestiondeseguimiento.html">SEGUIMIENTO</a>
        </nav>
    </header>

    <main class="min-h-[calc(100vh-64px)] flex justify-center items-center p-6">
        
        <section class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-gray-100">
            
            <form id="register-form" action="registrar.php" method="POST" class="flex flex-col gap-4">
                <img src="imagenes/Ozuna-090518 (1).jpg" alt="Perfil" class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-[#4f7d67]">
                
                <h2 class="text-2xl font-bold text-center text-gray-800">Crea tu cuenta</h2>
                
                <input type="text" name="nombre" placeholder="Nombre completo" required 
                    class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#4f7d67] transition"> 
                
                <input type="email" name="correo" placeholder="Gmail" required 
                    class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#4f7d67] transition">
                
                <input type="password" name="password" placeholder="Contraseña" required 
                    class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#4f7d67] transition">
                
                <button type="submit" class="w-full bg-[#4f7d67] text-white font-bold py-3 rounded-xl hover:opacity-90 shadow-lg transition-all active:scale-95">
                    REGÍSTRATE
                </button>
                
                <p class="text-center text-sm text-gray-500 cursor-pointer hover:text-[#4f7d67] transition" onclick="showLoginForm()">
                    ¿Ya tienes cuenta? <span class="font-bold">Inicia sesión</span>
                </p>
            </form>

            <form id="login-form" action="login.php" method="POST" class="hidden flex flex-col gap-4">
                <img src="imagenes/ricardo.jpg" alt="Perfil" class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-[#4f7d67]">
                
                <h2 class="text-2xl font-bold text-center text-gray-800">Bienvenido de nuevo</h2>
                
                <input type="text" name="usuario_login" placeholder="Nombre de usuario" required 
                    class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#4f7d67] transition">
                
                <input type="password" name="password_login" placeholder="Contraseña" required 
                    class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#4f7d67] transition">
                
                <button type="submit" class="w-full bg-[#4f7d67] text-white font-bold py-3 rounded-xl hover:opacity-90 shadow-lg transition-all active:scale-95">
                    INICIA SESIÓN
                </button>
                
                <p class="text-center text-sm text-gray-500 cursor-pointer hover:text-[#4f7d67] transition" onclick="showRegisterForm()">
                    ¿No tienes cuenta? <span class="font-bold">Regístrate</span>
                </p>
            </form>

        </section>
    </main>

    <script>
        function showLoginForm() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }
        function showRegisterForm() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
    </script>
</body>
</html>
